services:
  postgres:
    image: postgres:16-alpine
    container_name: dental-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dental_clinic
    ports:
      - "5432:5432"
    volumes:
      - dental_data:/var/lib/postgresql/data

volumes:
  dental_data:
